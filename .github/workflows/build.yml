name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag name (default mpv version)"
        default: ""

jobs:
  metadata:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version to release
        id: version
        env:
          REQUESTED_RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import textwrap
          from pathlib import Path

          def normalize_version(version_string):
            version_string = re.sub(r'[^.0-9]+|-.+', '', version_string)
            parts = re.split(r'\.', version_string)
            major = int(parts[0])
            minor = int(parts[1]) if len(parts) > 1 else 0
            patch = int(parts[2]) if len(parts) > 2 else 0
            return f"{major}.{minor}.{patch}"

          file_path = Path('./Sources/BuildScripts/XCFrameworkBuild/main.swift')
          content = file_path.read_text(encoding='utf-8')

          mpv_version = re.search(r'(case .libmpv[^"]+?)"(.+?)"', content).group(2)
          ffmpeg_version = re.search(r'(case .FFmpeg[^"]+?)"(.+?)"', content).group(2)
          libplacebo_version = re.search(r'(case .libplacebo[^"]+?)"(.+?)"', content).group(2)
          vulkan_version = re.search(r'(case .vulkan[^"]+?)"(.+?)"', content).group(2)

          release_version = os.environ.get('REQUESTED_RELEASE_VERSION') or normalize_version(mpv_version)
          print(f'mpv version: {mpv_version}')
          print(f'ffmpeg version: {ffmpeg_version}')
          print(f'release version: {release_version}')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
            output.write(f'build_version={mpv_version}\n')
            output.write(f'release_version={release_version}\n')

          Path('/tmp/RELEASE_NOTE.txt').write_text(textwrap.dedent(f'''
          * mpv version: {mpv_version} ([changelog](https://github.com/mpv-player/mpv/releases/tag/{mpv_version}))
          * ffmpeg version: {ffmpeg_version} ([changelog](https://github.com/FFmpeg/FFmpeg/blob/{ffmpeg_version}/Changelog))
          * placebo version: v{libplacebo_version}
          * MoltenVK version: v{vulkan_version}
          ''').strip() + '\n', encoding='utf-8')
          PY

      - name: Upload release note
        uses: actions/upload-artifact@v4
        with:
          name: release-note
          path: /tmp/RELEASE_NOTE.txt
          if-no-files-found: error

  build:
    needs: metadata
    permissions:
      contents: read
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            platforms: macos
          - name: maccatalyst
            platforms: maccatalyst
          - name: iphoneos
            platforms: ios-device
          - name: iphonesimulator
            platforms: ios-simulator
          - name: tvos
            platforms: tvos-device
          - name: tvsimulator
            platforms: tvos-simulator
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install autoconf automake libtool ninja
          python -m pip install meson==1.4.2

      - name: Build GPL version (${{ matrix.name }})
        run: |
          make build enable-gpl platform=${{ matrix.platforms }} version=${{ needs.metadata.outputs.release_version }}

      - name: Upload platform build (${{ matrix.name }})
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.name }}
          path: |
            ./dist/release/*.xcframework.zip
            ./dist/release/*.xcframework.checksum.txt
            ./dist/release/Package.swift
          if-no-files-found: error

  publish:
    needs:
      - metadata
      - build
    permissions:
      contents: write
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Download platform builds
        uses: actions/download-artifact@v4
        with:
          pattern: platform-*
          path: ./dist/partials

      - name: Download release note
        uses: actions/download-artifact@v4
        with:
          name: release-note
          path: /tmp

      - name: Merge platform XCFrameworks
        run: |
          python3 - <<'PY'
          import shutil
          import subprocess
          import tempfile
          from pathlib import Path

          partial_root = Path('dist/partials')
          release_dir = Path('dist/release')
          xcframework_dir = release_dir / 'xcframework'

          if release_dir.exists():
            shutil.rmtree(release_dir)
          release_dir.mkdir(parents=True)
          xcframework_dir.mkdir()

          package_source = next(partial_root.glob('*/Package.swift'), None)
          if package_source is None:
            raise SystemExit('No generated Package.swift found in platform artifacts')
          shutil.copy2(package_source, release_dir / 'Package.swift')

          grouped_zips = {}
          for zip_path in partial_root.glob('*/*.xcframework.zip'):
            grouped_zips.setdefault(zip_path.name, []).append(zip_path)
          if not grouped_zips:
            raise SystemExit('No platform XCFramework artifacts found')

          for zip_name, zip_parts in sorted(grouped_zips.items()):
            framework_name = zip_name[:-len('.xcframework.zip')]
            output_xcframework = xcframework_dir / f'{framework_name}.xcframework'
            framework_paths = []

            with tempfile.TemporaryDirectory() as tmp:
              tmp_path = Path(tmp)
              for index, zip_part in enumerate(sorted(zip_parts)):
                extract_dir = tmp_path / f'part-{index}'
                extract_dir.mkdir()
                subprocess.run(['/usr/bin/unzip', '-q', str(zip_part.resolve()), '-d', str(extract_dir)], check=True)
                framework_paths.extend(sorted(path for path in extract_dir.glob('*.xcframework/**/*.framework') if path.is_dir()))

              if not framework_paths:
                raise SystemExit(f'No frameworks found inside {zip_name}')

              args = ['/usr/bin/xcodebuild', '-create-xcframework']
              for framework_path in framework_paths:
                args.extend(['-framework', str(framework_path)])
              args.extend(['-output', str(output_xcframework)])
              subprocess.run(args, check=True)

            merged_zip = release_dir / zip_name
            subprocess.run(['/usr/bin/zip', '-qry', str(merged_zip.resolve()), output_xcframework.name], cwd=xcframework_dir, check=True)
            checksum = subprocess.check_output(['swift', 'package', 'compute-checksum', str(merged_zip.resolve())], text=True).strip()
            (release_dir / f'{framework_name}.xcframework.checksum.txt').write_text(checksum + '\n', encoding='utf-8')
            print(f'Merged {zip_name} from {len(zip_parts)} platform artifacts')

          PY

      - name: Update Package.swift
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          package_file = Path('dist/release/Package.swift')
          package_text = package_file.read_text(encoding='utf-8')
          checksum_suffix = '.xcframework.checksum.txt'

          for checksum_file in sorted(Path('dist/release').glob(f'*{checksum_suffix}')):
            target_name = checksum_file.name[:-len(checksum_suffix)]
            checksum = checksum_file.read_text(encoding='utf-8').strip()
            pattern = re.compile(rf'(name:\s*"{re.escape(target_name)}",\s*\n\s*url:\s*"[^"]+",\s*\n\s*checksum:\s*")[^"]+(")')
            package_text, replaced = pattern.subn(lambda match: f'{match.group(1)}{checksum}{match.group(2)}', package_text)
            if replaced != 1:
              raise SystemExit(f'Expected one Package.swift entry for {target_name}, replaced {replaced}')

          package_file.write_text(package_text, encoding='utf-8')
          PY

          rm -f ./Package.swift
          cp -f ./dist/release/Package.swift ./Package.swift

          # Remove libbluray artifacts
          rm -rf ./dist/release/libbluray*.zip
          rm -rf ./dist/release/Libbluray*.zip
          rm -rf ./dist/release/Libbluray*.txt

      - name: Push Package.swift
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          add: |
            - Package.swift
          message: "chore: bump version to ${{ needs.metadata.outputs.release_version }}"
          push: "origin HEAD:${{ github.ref_name }}"

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.metadata.outputs.release_version }}
          tag_name: ${{ needs.metadata.outputs.release_version }}
          files: |
            ./dist/release/*.txt
            ./dist/release/*.zip
          prerelease: ${{ contains(needs.metadata.outputs.release_version, '-') }}
          body_path: /tmp/RELEASE_NOTE.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
